name: Daily Commit by 23f2003992@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 10 PM UTC (pick any specific time, e.g., 22:00)
  workflow_dispatch:      # Lets you test manually

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update status file by 23f2003992@ds.study.iitm.ac.in
        run: |
          echo "$(date): Daily automated update" >> STATUS.md

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily commit $(date)"
